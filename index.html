<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Utkarsh Lanjewar - Future Doctor (2nd Year BAMS Student) | Modernizing Ayurveda for the New Generation." />
    <meta name="keywords" content="BAMS student resources, Modern Ayurveda tips, Utkarsh Lanjewar official website, Ayurveda biohacks" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <title>Utkarsh Lanjewar | Modern Ayurveda</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        background-color: #0D0F14; /* Matches Tailwind primary */
        color: #f1ebd9; /* Matches Tailwind cream */
        font-family: 'Inter', sans-serif;
      }
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #0D0F14;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(200, 134, 10, 0.2);
        border-top: 4px solid #C8860A; /* Gold */
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Remove loader once React has mounted
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 500);
          }
        }, 100);
      });
    </script>
  </body>
</html>
